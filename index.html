<body>
  <h2>Boxxy Flatpak Remote</h2>
  <p>Add the remote:</p>
  <pre>flatpak remote-add --user --if-not-exists --gpg-import=boxxy.gpg boxxy https://boxxy-dev.github.io/boxxy-flatpak-remote/repo</pre>
  <p>Install:</p>
  <pre>flatpak install --user boxxy dev.boxxy.BoxxyTerminal</pre>
  <p>Download GPG key: <a href="boxxy.gpg">boxxy.gpg</a></p>
</body>
</html>

name: Sync Nightly Commit

on:
  repository_dispatch:
    types: [nightly-built]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update commit SHA in manifest
        run: |
          COMMIT="${{ github.event.client_payload.commit }}"
          sed -i "s/commit: .*/commit: $COMMIT/" dev.boxxy.BoxxyTerminal.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev.boxxy.BoxxyTerminal.yml
          git diff --cached --quiet && echo "No changes, skipping commit" && exit 0
          git commit --no-gpg-sign -m "chore: sync nightly $(date -u '+%Y-%m-%d') [${{ github.event.client_payload.commit }}]"
          git push
